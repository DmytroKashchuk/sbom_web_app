<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Starting Data - Global 2000 GitHub Profiles</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator_midnight.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
  <style>
    body { background:#0f1115; color:#fff; padding-top:70px; }
    .tabulator { background:#1a1d23; }
    .page-title { letter-spacing:.05em; }
    .table-wrapper { border-radius:12px; overflow:hidden; box-shadow:0 0 25px -5px rgba(0,0,0,.6); }
    .stat-chip { background:#1f242b; border:1px solid #2c323c; border-radius:24px; padding:6px 14px; font-size:.75rem; text-transform:uppercase; letter-spacing:.1em; margin:0 6px 6px 0; display:inline-flex; align-items:center; }
    .stat-chip span { font-weight:600; color:#4dabf7; margin-left:4px; }
    a.profile-link { color:#66d9ef; }
    a.profile-link:hover { text-decoration:underline; }
  </style>
</head>
<body>
  {% include 'navbar.html' %}
  <div class="container-fluid">
    <div class="d-flex align-items-center mb-3 flex-wrap">
      <h2 class="page-title mr-3 mb-2 mb-sm-0">Starting Data (Global 2000 Raw Profiles)</h2>
      <div class="stat-chip">Rows <span>{{ records|length }}</span></div>
      <div class="stat-chip">Columns <span>{{ columns|length }}</span></div>
      <div id="filteredCount" class="stat-chip">Filtered <span>{{ records|length }}</span></div>
    </div>
    <div class="row mb-3">
      <div class="col-md-3 mb-2">
        <input id="searchInput" class="form-control" placeholder="Search company or country...">
      </div>
      <div class="col-md-3 mb-2">
        <select id="countryFilter" class="form-control">
          <option value="">Filter Country</option>
        </select>
      </div>
      <div class="col-md-3 mb-2">
        <select id="hasProfile" class="form-control">
          <option value="">GitHub Profile?</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
      <div class="col-md-3 mb-2 text-right">
        <button id="downloadCsv" class="btn btn-sm btn-outline-light">Download CSV</button>
      </div>
    </div>
    <div class="table-wrapper">
      <div id="starting-data-table"></div>
    </div>
  </div>
  <script>
    // Embed data safely
    const rawData = JSON.parse('{{ records | tojson | safe }}');
    const tableColumns = JSON.parse('{{ columns | tojson | safe }}');

    function buildColumns(cols){
      return cols.map(c => ({
        title: c.replace(/_/g,' ').replace(/\b\w/g, ch=>ch.toUpperCase()),
        field: c,
        headerFilter: false,
        formatter: function(cell){
          if(c==='github_profile'){
            const val = cell.getValue();
            if(val && val!=='None') return `<a class="profile-link" href="${val}" target="_blank">Link</a>`;
            return '<span style="color:#777">—</span>';
          }
          return cell.getValue();
        }
      }));
    }

    const table = new Tabulator('#starting-data-table', {
      data: rawData,
      layout:"fitDataStretch",
      reactiveData:true,
      height: "70vh",
      columns: buildColumns(tableColumns),
      pagination:true,
      paginationSize:25,
      paginationSizeSelector:[10,25,50,100,250],
      movableColumns:true,
      tooltips:true,
      placeholder:"No Data",
      rowFormatter:function(row){
        const d = row.getData();
        if(d.github_profile && d.github_profile !== 'None'){
          row.getElement().style.background='linear-gradient(90deg,#1d262f,#182029)';
        }
      },
      dataFiltered:function(filters, rows){
        document.getElementById('filteredCount').innerHTML = 'Filtered <span>'+rows.length+'</span>';
      }
    });

    // Populate country filter options
    const countries = Array.from(new Set(rawData.map(r=>r.country).filter(Boolean))).sort();
    const countrySel = document.getElementById('countryFilter');
    countries.forEach(c=>{ const opt=document.createElement('option'); opt.value=c; opt.textContent=c; countrySel.appendChild(opt); });

    function applyFilters(){
      const searchVal = document.getElementById('searchInput').value.toLowerCase();
      const countryVal = countrySel.value;
      const hasProfileVal = document.getElementById('hasProfile').value;
      table.clearFilter();
      const filters=[];
      if(searchVal){
        filters.push({
          field:tableColumns[1], type:function(filterVal, rowVal, rowData, filterParams){
            const gc = (rowData.global_company||'').toLowerCase();
            const country = (rowData.country||'').toLowerCase();
            return gc.includes(searchVal)||country.includes(searchVal);
          }
        });
      }
      if(countryVal){ filters.push({field:'country', type:'=', value:countryVal}); }
      if(hasProfileVal){
        if(hasProfileVal==='yes') filters.push({field:'github_profile', type:function(v){ return v && v!=='None'; }});
        else filters.push({field:'github_profile', type:function(v){ return !v || v==='None'; }});
      }
      table.setFilter(filters);
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    countrySel.addEventListener('change', applyFilters);
    document.getElementById('hasProfile').addEventListener('change', applyFilters);

    document.getElementById('downloadCsv').addEventListener('click', ()=> table.download('csv','starting_data.csv'));
  </script>
</body>
</html>
