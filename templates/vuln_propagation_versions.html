<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vulnerability Propagation • Library Versions</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-dYyrwHua+O6pwxKF1u9IiMaivGi99ZTSdKCbFf8gUpbZQ+Q0jrISFRCGDpa2BkLomPvKgJo6aoVuv5Q9MbugXg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator_simple.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
  <style>
    body {
      background-color: #f8f9fa;
      padding-top: 70px;
    }

    .page-header {
      background: linear-gradient(45deg, #343a40, #007bff);
      color: #fff;
      padding: 1.5rem 0;
      margin-bottom: 1.5rem;
    }

    .metric-card {
      border: none;
      border-radius: 0.75rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.15);
      overflow: hidden;
      transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
    }

    .metric-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.2);
    }

    .metric-card .card-body {
      padding: 1.25rem;
    }

    .metric-label {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
    }

    .metric-value {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
    }

    .tabulator .tabulator-col {
      cursor: pointer;
    }

    .tabulator .tabulator-header .tabulator-col .tabulator-col-title {
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .tabulator .tabulator-cell {
      font-size: 0.9rem;
    }

    .search-input {
      border-radius: 999px;
      padding-left: 2.5rem;
    }

    .search-wrapper {
      position: relative;
    }

    .search-wrapper .search-icon {
      position: absolute;
      top: 50%;
      left: 1rem;
      transform: translateY(-50%);
      color: #6c757d;
    }

    .section-title {
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #6c757d;
      margin-bottom: 0.75rem;
    }
  </style>
</head>

<body>
  {% include 'navbar.html' %}

  <header class="page-header">
    <div class="container-fluid">
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between">
        <div>
          <h1 class="h3 mb-1">Library Version Impact</h1>
          <p class="mb-0">How specific library versions propagate across organizations and repositories.</p>
        </div>
      </div>
    </div>
  </header>

  <main class="container-fluid">
    

    <section class="mb-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between mb-3">
            <div class="d-flex align-items-center flex-wrap" style="gap:.5rem;">
              <div class="search-wrapper mt-3 mt-lg-0 mr-2">
                <span class="search-icon"><i class="fas fa-search"></i></span>
                <input id="filterLibrary" type="search" class="form-control search-input" placeholder="Filter by library">
              </div>
              <div class="search-wrapper mt-3 mt-lg-0 mr-2">
                <span class="search-icon"><i class="fas fa-tag"></i></span>
                <input id="filterVersion" type="search" class="form-control search-input" placeholder="Filter by version">
              </div>
              <select id="filterVuln" class="form-control mt-3 mt-lg-0 mr-2">
                <option value="all">All</option>
                <option value="vuln">Vulnerable only</option>
                <option value="safe">Non-vulnerable only</option>
              </select>
              <button id="clearFilters" class="btn btn-outline-secondary mt-3 mt-lg-0">Clear</button>
            </div>
            <div class="d-flex align-items-center mt-3 mt-lg-0">
              <div class="dropdown mr-2">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="colsDropdown" data-toggle="dropdown">Columns</button>
                <div class="dropdown-menu dropdown-menu-right p-3" id="columnsMenu"></div>
              </div>
              <button id="downloadCsv" class="btn btn-success"><i class="fas fa-download mr-1"></i>Download CSV</button>
            </div>
          </div>
          <div id="libVersionTable"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js" integrity="sha512-3gBs7qEP+0N2aUlCTRVocOITkkpFmS6r30YIOCwVDDDeWGPA7eGRIDLaHruM3aMcMBXNIN1qZtEUfqZrL5S6jw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script id="table-data" type="application/json">{{ records_json | safe }}</script>
  <script id="columns-data" type="application/json">{{ columns | tojson | safe }}</script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const tableData = JSON.parse(document.getElementById('table-data').textContent || '[]');
      const columnNames = JSON.parse(document.getElementById('columns-data').textContent || '[]');

      const numericColumns = new Set([
        'affected_organizations',
        'affected_repositories',
        'different_versions',
        'different_paths',
        'different_types',
        'total_vulnerabilities'
      ]);

      const columns = columnNames.map(name => {
        const title = name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const columnConfig = {
          title,
          field: name,
          headerSort: true
        };
        if (numericColumns.has(name)) {
          columnConfig.hozAlign = 'right';
          columnConfig.sorter = 'number';
          columnConfig.formatter = function (cell) {
            const value = cell.getValue();
            if (value === null || value === undefined || value === '') {
              return '';
            }
            return Number(value).toLocaleString();
          };
        } else {
          columnConfig.formatter = function (cell) {
            const value = cell.getValue();
            if (!value) return '';
            return `<span class="font-weight-bold">${value}</span>`;
          };
        }

  if (name === 'affected_organizations') {
          columnConfig.hozAlign = 'right';
          columnConfig.formatter = function (cell) {
            const value = cell.getValue();
            if (value === null || value === undefined || value === '') {
              return '';
            }
            const displayValue = Number(value).toLocaleString();
            return `<button type="button" class="btn btn-link p-0 font-weight-bold org-count-trigger" title="View affected organizations">${displayValue}</button>`;
          };
          columnConfig.cellClick = function (e, cell) {
            e.preventDefault();
            const rowData = cell.getRow().getData();
            const count = cell.getValue();
            if (!rowData || !rowData.library || count === null || count === undefined) {
              return;
            }
            const versionValue = rowData.version ? String(rowData.version) : '';
            const params = new URLSearchParams({ library: String(rowData.library) });
            if (versionValue) { params.append('version', versionValue); }
            window.location.href = `/vuln_propagation/library_versions/orgs?${params.toString()}`;
          };
        }
        return columnConfig;
      });

      const table = new Tabulator('#libVersionTable', {
        data: tableData,
        layout: 'fitColumns',
        responsiveLayout: 'collapse',
        pagination: 'local',
        paginationSize: 50,
        paginationSizeSelector: [25, 50, 100, 250, 500],
        columns: columns,
        height: '600px',
        placeholder: 'No data available for the current selection.'
      });

      // Top-level filters (library, version, vulnerability)
      const libInput = document.getElementById('filterLibrary');
      const verInput = document.getElementById('filterVersion');
      const vulnSel  = document.getElementById('filterVuln');
      const clearBtn = document.getElementById('clearFilters');

      function normalize(val){ return (val==null? '' : String(val)).toLowerCase().trim(); }
      function isRowVuln(row){
        const raw = row.is_vulnerable;
        const s = normalize(raw);
        return s === 'true' || s === 'yes' || s === '1';
      }

      function applyFilters(){
        const libQ = normalize(libInput.value);
        const verQ = normalize(verInput.value);
        const mode = (vulnSel.value || 'all');

        table.setFilter(function(row){
          const lib = normalize(row.library);
          const ver = normalize(row.version);
          const vuln = isRowVuln(row);

          const libOk = !libQ || lib.includes(libQ);
          const verOk = !verQ || ver.includes(verQ);
          const vulnOk = (mode==='all') || (mode==='vuln' && vuln) || (mode==='safe' && !vuln);
          return libOk && verOk && vulnOk;
        });
      }

      [libInput, verInput].forEach(el => el && el.addEventListener('input', applyFilters));
      vulnSel && vulnSel.addEventListener('change', applyFilters);
      clearBtn && clearBtn.addEventListener('click', function(){
        if(libInput) libInput.value='';
        if(verInput) verInput.value='';
        if(vulnSel) vulnSel.value='all';
        applyFilters();
      });
      // Initialize with no filters
      applyFilters();

      // Build Columns menu with show/hide toggles
      const columnsMenu = document.getElementById('columnsMenu');
      if (columnsMenu) {
        columnNames.forEach((name, idx) => {
          const id = `col-${idx}`;
          const wrapper = document.createElement('div');
          wrapper.className = 'form-check';
          wrapper.innerHTML = `
            <input class="form-check-input" type="checkbox" id="${id}" checked>
            <label class="form-check-label" for="${id}">${name.replace(/_/g,' ')}</label>
          `;
          columnsMenu.appendChild(wrapper);
          const input = wrapper.querySelector('input');
          input.addEventListener('change', () => {
            const col = table.getColumn(name);
            if (!col) return;
            if (input.checked) col.show(); else col.hide();
          });
        });
      }

      // CSV Download
      const dlBtn = document.getElementById('downloadCsv');
      dlBtn && dlBtn.addEventListener('click', () => {
        table.download('csv', 'library_versions.csv', { bom: true, columnHeaders: true, rowRange: 'all' });
      });

      // Modal logic removed: we now navigate to a full page with company details.
    });
  </script>
</body>

</html>
