<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Raw Data • Libraries Detailed Vulnerability Status</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" rel="stylesheet">
  <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator_simple.min.css" rel="stylesheet">
  <style>
    body { padding-top: 70px; }
    .tabulator .tabulator-header .tabulator-col .tabulator-col-title { font-weight: 600; }
    #top-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      height: 18px;
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: .25rem;
    }
    #top-scroll::-webkit-scrollbar { height: 12px; }
    #top-scroll-inner { height: 1px; }
  </style>
</head>
<body>
  {% include 'navbar.html' %}
  <div class="container-fluid">
    <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap">
      <h2 class="mb-2">Libraries Detailed Vulnerability Status (raw)</h2>
      <div class="form-inline">
        <span class="mr-3 text-muted small">Rows: <strong id="row-count">0</strong></span>
        <input id="search-input" class="form-control form-control-sm mr-2" type="search" placeholder="Search libraries...">
        <button id="clear-search" class="btn btn-sm btn-outline-secondary">Clear</button>
      </div>
    </div>

    <div id="top-scroll" class="mb-1"><div id="top-scroll-inner"></div></div>

    <script id="libraries-data" type="application/json">{{ records|tojson | safe }}</script>
    <script id="libraries-columns" type="application/json">{{ columns|tojson | safe }}</script>

    <div id="libraries-table"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>

  <script>
    const tableData = JSON.parse(document.getElementById('libraries-data').textContent || '[]');
    const colsArr = JSON.parse(document.getElementById('libraries-columns').textContent || '[]');

    document.getElementById('row-count').textContent = Array.isArray(tableData) ? tableData.length : 0;

    const columns = (Array.isArray(colsArr) && colsArr.length ? colsArr : (tableData[0] ? Object.keys(tableData[0]) : [])).map(col => {
      const base = { title: col, field: col, headerSort: true };
      if (col === 'repository' || col === 'repository_name') {
        return { ...base, formatter: cell => {
          const data = cell.getRow().getData();
          const repo = cell.getValue();
          const org = data.organization || data.Organization;
          if (!org || !repo) return repo || '';
          const url = `/libs/${org}/${repo}`;
          return `<a href="${url}">${repo}</a>`;
        }};
      }
      if (col === 'organization' || col === 'Organization') {
        return { ...base, formatter: cell => {
          const org = cell.getValue();
          if (!org) return '';
          return `<a href="/repos/${org}">${org}</a>`;
        }};
      }
      if (col === 'links' || col === 'link') {
        return { ...base, formatter: cell => {
          const val = cell.getValue();
          if (!val) return '';
          return `<a href="${val}" target="_blank" rel="noopener">Advisory</a>`;
        }};
      }
      if (col === 'path') {
        return { ...base, formatter: cell => {
          const val = cell.getValue();
          return val ? `<code>${val}</code>` : '';
        }};
      }
      if (col === 'is_vulnerable') {
        return { ...base, formatter: cell => {
          const val = (cell.getValue() || '').toString().toLowerCase();
          if (val === 'true') return '<span class="badge badge-danger">True</span>';
          if (val === 'false') return '<span class="badge badge-success">False</span>';
          return cell.getValue() ?? '';
        }};
      }
      return base;
    });

    const table = new Tabulator('#libraries-table', {
      data: tableData,
      columns,
      layout: 'fitData',
      columnMinWidth: 140,
      pagination: 'local',
      paginationSize: 50,
      paginationSizeSelector: [25, 50, 100, 250, 500, true],
      paginationButtonCount: 5,
      height: 'auto',
      virtualDom: true,
      columnHeaderVertAlign: 'bottom',
      placeholder: 'No data available',
    });

    const holder = table.getElement().querySelector('.tabulator-tableholder');
    const topScroll = document.getElementById('top-scroll');
    const topInner = document.getElementById('top-scroll-inner');

    function syncScrollWidth() {
      if (!holder || !topInner) return;
      const contentWidth = Math.max(holder.scrollWidth, holder.clientWidth + 1);
      topInner.style.width = contentWidth + 'px';
      topScroll.scrollLeft = holder.scrollLeft;
    }

    if (holder && topScroll) {
      topScroll.addEventListener('scroll', () => { holder.scrollLeft = topScroll.scrollLeft; });
      holder.addEventListener('scroll', () => { topScroll.scrollLeft = holder.scrollLeft; });
      table.on('tableBuilt', syncScrollWidth);
      table.on('dataLoaded', syncScrollWidth);
      table.on('renderComplete', syncScrollWidth);
      table.on('columnResized', syncScrollWidth);
      syncScrollWidth();
      window.addEventListener('resize', syncScrollWidth);
    }

    const searchInput = document.getElementById('search-input');
    const clearBtn = document.getElementById('clear-search');

    function applySearch() {
      const term = (searchInput.value || '').trim().toLowerCase();
      if (!term) {
        table.clearFilter();
        return;
      }
      table.setFilter(rowData => Object.values(rowData || {}).some(val => String(val || '').toLowerCase().includes(term)));
    }

    searchInput.addEventListener('input', applySearch);
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      table.clearFilter();
    });
  </script>
</body>
</html>
